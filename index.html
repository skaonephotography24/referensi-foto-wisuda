<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referensi Foto Wisuda</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f2f2f7;
}

/* HEADER */
header{
    position:sticky;
    top:0;
    z-index:100;
    display:flex;
    align-items:center;
    gap:12px;
    padding:18px 20px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.7);
    box-shadow:0 2px 12px rgba(0,0,0,0.05);
}

header img{
    width:36px;
    height:36px;
}

h1{
    font-size:22px;
    font-weight:700;
}

/* GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:16px;
    padding:20px;
}

.photo-card{
    position:relative;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:.35s;
}

.photo-card:hover{
    transform:scale(1.04) translateY(-4px);
}

.photo-card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
    filter:blur(10px);
    transition:filter .4s;
}

.photo-card img.loaded{
    filter:blur(0);
}

/* gradient overlay */
.photo-card::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.2), transparent);
    opacity:0;
    transition:.3s;
}

.photo-card:hover::after{
    opacity:1;
}

/* VIEWER */
.viewer{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.viewer.active{
    display:flex;
}

.viewer img{
    max-width:95%;
    max-height:90%;
    border-radius:16px;
    transition:transform .3s, opacity .3s;
}

/* CLOSE */
.close-btn{
    position:absolute;
    top:20px;
    right:20px;
    color:white;
    font-size:28px;
    cursor:pointer;
}

/* COUNTER */
.counter{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:14px;
    background:rgba(0,0,0,0.4);
    padding:6px 12px;
    border-radius:20px;
}
</style>
</head>
<body>

<header>
    <img src="logo.png" alt="logo">
    <h1>Referensi Foto Wisuda</h1>
</header>

<div class="gallery" id="gallery"></div>

<div class="viewer" id="viewer">
    <div class="close-btn" onclick="closeViewer()">✕</div>
    <div class="counter" id="counter"></div>
    <img id="viewerImg">
</div>

<script>
const gallery = document.getElementById("gallery");
const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");
const counter = document.getElementById("counter");

let images = [];
let currentIndex = 0;
let startX = 0;
let startY = 0;
let scale = 1;

/* LOAD JSON */
fetch("images/images.json")
.then(res => res.json())
.then(files => {
    images = files;

    files.forEach((file, index) => {
        const card = document.createElement("div");
        card.className = "photo-card";

        const img = document.createElement("img");
        img.src = `images/${file}`;
        img.loading = "lazy";

        img.onload = () => img.classList.add("loaded");

        card.onclick = () => openViewer(index);

        card.appendChild(img);
        gallery.appendChild(card);
    });
});

/* VIEWER */
function openViewer(index){
    currentIndex = index;
    scale = 1;
    updateImage();
    viewer.classList.add("active");
}

function closeViewer(){
    viewer.classList.remove("active");
}

function updateImage(){
    viewerImg.src = `images/${images[currentIndex]}`;
    viewerImg.style.transform = `scale(${scale})`;
    counter.innerText = `${currentIndex+1} / ${images.length}`;

    preload((currentIndex+1)%images.length);
}

/* PRELOAD */
function preload(index){
    let img = new Image();
    img.src = `images/${images[index]}`;
}

/* NAVIGATION */
function showNext(){
    currentIndex = (currentIndex + 1) % images.length;
    updateImage();
}

function showPrev(){
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    updateImage();
}

/* SWIPE */
viewer.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});

viewer.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;
    let endY = e.changedTouches[0].clientY;

    let diffX = startX - endX;
    let diffY = endY - startY;

    if(Math.abs(diffX) > 40){
        diffX > 0 ? showNext() : showPrev();
    }

    if(diffY > 120){
        closeViewer();
    }
});

/* ZOOM */
viewerImg.addEventListener("wheel", e => {
    e.preventDefault();
    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(1, scale), 3);
    viewerImg.style.transform = `scale(${scale})`;
});

/* DOUBLE CLICK */
viewerImg.addEventListener("dblclick", () => {
    scale = scale === 1 ? 2 : 1;
    viewerImg.style.transform = `scale(${scale})`;
});

/* KEYBOARD */
document.addEventListener("keydown", e => {
    if(!viewer.classList.contains("active")) return;

    if(e.key === "ArrowRight") showNext();
    if(e.key === "ArrowLeft") showPrev();
    if(e.key === "Escape") closeViewer();
});

/* CLICK OUTSIDE */
viewer.addEventListener("click", e => {
    if(e.target === viewer){
        closeViewer();
    }
});
</script>

</body>
</html>
